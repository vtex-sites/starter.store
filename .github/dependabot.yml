version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    allow:
      # Allow updates for @faststore/core
      - dependency-name: "@faststore/core"
        dependency-type: "direct"
    # Prefix all commit messages with "Evergreen"
    # include a list of updated dependencies
    commit-message:
      prefix: "Evergreen"
      include: "scope"
    # Specify labels for npm pull requests
    labels:
      - "Evergreen"
